<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RX RH System</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    }
    .box{
      width:100%;max-width:420px;background:#fff;padding:32px;border-radius:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
    }
    h1{font-size:28px;color:#0f172a;margin-bottom:8px}
    p{color:#64748b;margin-bottom:22px}
    label{display:block;margin:10px 0 6px;color:#334155;font-size:14px;font-weight:700}
    input{
      width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:10px;
      outline:none;font-size:15px
    }
    input:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    button{
      width:100%;margin-top:18px;padding:13px;border:none;border-radius:10px;
      background:#2563eb;color:#fff;font-size:15px;font-weight:700;cursor:pointer
    }
    .alert{
      background:#fee2e2;color:#991b1b;padding:12px 14px;border-radius:10px;
      margin-bottom:14px;font-size:14px
    }
    .demo{
      margin-top:16px;background:#e2e8f0;padding:12px 14px;border-radius:10px;
      color:#334155;font-size:14px;line-height:1.6
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>RX RH System</h1>
    <p>Entre com seu usuário e senha.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for categoria, mensagem in messages %}
          <div class="alert">{{ mensagem }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <label>Usuário</label>
      <input type="text" name="usuario" required>

      <label>Senha</label>
      <input type="password" name="senha" required>

      <button type="submit">Entrar</button>
    </form>

    <div class="demo">
      <strong>Acesso inicial</strong><br>
      Usuário: admin<br>
      Senha: 123456
    </div>
  </div>
</body>
</html>
